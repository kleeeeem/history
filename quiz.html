<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Две судьбы | Викторина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background-color: #f8f9fc; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; }
        .korolev-color { color: #1e4f8a; }
        .vavilov-color { color: #a13b2f; }
        .nav-link.active { font-weight: 600; border-bottom: 2px solid #1e4f8a; }
        .quiz-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 15px 30px -12px rgba(0,20,40,0.15);
            margin-bottom: 1.5rem;
        }
        .btn-quiz {
            background: #1e4f8a;
            border: none;
            border-radius: 40px;
            padding: 10px 30px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-quiz:hover { background: #0f3b63; transform: translateY(-2px); }
        .result-highlight { font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

<!-- навигация (обновлённая) -->
<nav class="navbar navbar-expand-lg bg-white py-3 border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="fas fa-flask me-2" style="color:#1e4f8a;"></i>Две судьбы
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center gap-3">
                <li class="nav-item"><a class="nav-link" href="korolev.html"><i class="fas fa-rocket korolev-color me-1"></i>Сергей Королёв</a></li>
                <li class="nav-item"><a class="nav-link" href="vavilov.html"><i class="fas fa-seedling vavilov-color me-1"></i>Николай Вавилов</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html">Сравнение</a></li>
                <li class="nav-item"><a class="nav-link active" href="quiz.html"><i class="fas fa-puzzle-piece me-1"></i>Викторина</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- главный блок викторины -->
<div class="container my-5">
    <div class="text-center mb-5">
        <h1 class="hero-title" style="font-size: 2.5rem;">🧠 Проверьте себя</h1>
        <p class="lead">Ответьте на 5 вопросов о судьбах Королёва и Вавилова</p>
    </div>

    <div id="quizContainer"></div>

    <div class="text-center mt-4">
        <button id="submitQuiz" class="btn btn-quiz text-white px-5 py-2"><i class="fas fa-check-circle me-2"></i>Показать результат</button>
    </div>

    <div id="quizResult" class="alert mt-4 d-none text-center" role="alert"></div>
</div>

<script>
    // Вопросы викторины
    const questions = [
        {
            text: "Кто из учёных прошёл через лагеря Колымы, но выжил и создал ракету Р-7?",
            options: ["Николай Вавилов", "Сергей Королёв", "Трофим Лысенко", "Константин Циолковский"],
            correct: 1
        },
        {
            text: "Как называется закон наследственной изменчивости, открытый Вавиловым?",
            options: ["Закон гомологических рядов", "Закон всемирного тяготения", "Закон сохранения энергии", "Периодический закон"],
            correct: 0
        },
        {
            text: "Почему генетика в СССР была объявлена «буржуазной лженаукой», а ракетостроение получило поддержку?",
            options: [
                "Королёв был родственником Сталина",
                "Ракеты давали военное преимущество, а генетика не давала быстрых результатов и противоречила идеологии Лысенко",
                "Вавилов отказался работать на НКВД, а Королёв — нет",
                "У Вавилова было плохое образование"
            ],
            correct: 1
        },
        {
            text: "Где и как умер Николай Вавилов?",
            options: [
                "Расстрелян в 1941 году",
                "Умер в блокадном Ленинграде от голода",
                "В тюремной больнице Саратова от пеллагры (истощения) в 1943 году",
                "Покончил с собой в тюрьме"
            ],
            correct: 2
        },
        {
            text: "Какой год ознаменовался первым полётом человека в космос (корабль «Восток» под руководством Королёва)?",
            options: ["1957", "1960", "1961", "1965"],
            correct: 2
        }
    ];

    // Рендеринг вопросов
    const container = document.getElementById('quizContainer');
    let quizHtml = '';
    questions.forEach((q, idx) => {
        quizHtml += `
            <div class="quiz-card">
                <h5 class="fw-bold mb-3">${idx+1}. ${q.text}</h5>
                <div class="ms-3">
                    ${q.options.map((opt, optIdx) => `
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="q${idx}" id="q${idx}_${optIdx}" value="${optIdx}">
                            <label class="form-check-label" for="q${idx}_${optIdx}">${opt}</label>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    });
    container.innerHTML = quizHtml;

    // Подсчёт результата
    const submitBtn = document.getElementById('submitQuiz');
    const resultDiv = document.getElementById('quizResult');

    submitBtn.addEventListener('click', () => {
        let correctCount = 0;
        questions.forEach((q, idx) => {
            const selected = document.querySelector(`input[name="q${idx}"]:checked`);
            if (selected && parseInt(selected.value) === q.correct) correctCount++;
        });
        const total = questions.length;
        let message = '';
        if (correctCount === total) message = `🎉 Идеально! ${correctCount}/${total}. Вы знаток истории! 🎉`;
        else if (correctCount >= total-1) message = `👍 Отлично! ${correctCount}/${total}. Почти всё верно.`;
        else if (correctCount >= total-2) message = `📚 Хорошо! ${correctCount}/${total}. Перечитайте раздел «Сравнение» на главной.`;
        else message = `🤔 ${correctCount}/${total}. Возможно, стоит заглянуть на страницы Королёва и Вавилова.`;

        resultDiv.classList.remove('d-none');
        resultDiv.innerHTML = `<i class="fas fa-star me-2"></i>${message}`;
        resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
